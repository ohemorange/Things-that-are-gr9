# Release pipeline to run our full test suite, build artifacts, and deploy them
# for GitHub release tags.
name: Release
run-name: Release Certbot ${{ github.ref_name }}
on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        type: string
        required: true

permissions:
  contents: read

jobs:
  test_and_deploy:
    uses: "./.github/workflows/test_and_deploy.yml"
    with:
      dockerTag: "${{ github.ref_name }}"
    permissions:
      contents: write
  create_github_release:
    name: Create GitHub release
    needs:
      - test_and_deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - name: Download changelog
        uses: actions/download-artifact@v8.0.1
        with:
          name: changelog
          path: "${{ github.workspace }}"
      - name: GitHub release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |-
          set -x

          git branch --show-current
          git status
          git log
          ls .
          ls "./release_notes.md"
          ls "${{ github.workspace }}/release_notes.md"
          ls "${{ github.workspace }}"
          cat "./release_notes.md"


          gh release create "$TAG" "${GITHUB_WORKSPACE}/packages/"{*.tar.gz,SHA256SUMS*} \
            --title "Certbot ${TAG#v}" \
            --notes-file "$GITHUB_WORKSPACE/release_notes.md"

  ###########################
  ####       notify       ###
  ###########################
  notify_success:
    needs:
      - create_github_release
    uses: "./.github/workflows/notify_release.yml"
    permissions:
      actions: read
      contents: read
    with:
      success: 'True'
    secrets:
      MATTERMOST_PUBLIC_CERTBOT_CHANNEL_WEBHOOK: "${{ secrets.MATTERMOST_PUBLIC_CERTBOT_CHANNEL_WEBHOOK }}"
  notify_failure:
    needs:
      - create_github_release
    if: ${{ failure() }}
    uses: "./.github/workflows/notify_release.yml"
    permissions:
      actions: read
      contents: read
    with:
      success: 'False'
    secrets:
      MATTERMOST_PUBLIC_CERTBOT_CHANNEL_WEBHOOK: "${{ secrets.MATTERMOST_PUBLIC_CERTBOT_CHANNEL_WEBHOOK }}"
