# Release pipeline to run our full test suite, build artifacts, and deploy them
# for GitHub release tags.
name: Release
run-name: Release Certbot ${{ github.ref_name }}
on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        type: string
        required: true

env:
  DOCKER_TAG: "${{ github.ref_name }}"

permissions:
  contents: read

jobs:
  # While many of these jobs could be grouped in a separate workflow, the github actions UI
  # is much nicer if they are instead listed explicitly here.
  ###########################
  ####    testing jobs    ###
  ###########################
  standard_tests_jobs:
    name: Standard tests
    runs-on: ubuntu-latest
    steps:
      - shell: bash
        run: exit 0
  extended_tests_jobs:
    name: Extended tests
    runs-on: ubuntu-latest
    steps:
      - shell: bash
        run: exit 0
  ###########################
  ####   packaging jobs   ###
  ###########################
  docker_packaging_jobs:
    name: Docker packaging
    runs-on: ubuntu-latest
    steps:
      - run: echo $dockerTag
        shell: bash
        env:
          dockerTag: "${{ env.DOCKER_TAG }}"
  snap_packaging_jobs:
    name: Snap packaging
    runs-on: ubuntu-latest
    steps:
      - shell: bash
        run: exit 0
  create_changelog:
    name: Create changelog
    uses: "./.github/workflows/create_changelog.yml"
  ############################
  ####     deploy jobs     ###
  ############################
  docker_deploy_jobs:
    name: Deploy docker images
    needs:
      - standard_tests_jobs
      - extended_tests_jobs
      - docker_packaging_jobs
    runs-on: ubuntu-latest
    steps:
      - shell: bash
        run: exit 0
  snap_deploy_jobs:
    name: Deploy snaps
    needs:
      - standard_tests_jobs
      - extended_tests_jobs
      - snap_packaging_jobs
    runs-on: ubuntu-latest
    steps:
      - shell: bash
        run: exit 0
  create_github_release:
    name: Create GitHub release
    needs:
      - standard_tests_jobs
      - extended_tests_jobs
      - docker_packaging_jobs
      - snap_packaging_jobs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - name: Download changelog
        uses: actions/download-artifact@v8.0.1
        with:
          name: changelog
          path: "${{ github.workspace }}/release_notes.md"
      - name: GitHub release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |-
          set -x
          ls $GITHUB_WORKSPACE
          ls "$GITHUB_WORKSPACE/packages/"
          ls "$GITHUB_WORKSPACE/packages/test_artifact.tar.gz"

          gh release create "$TAG" "$GITHUB_WORKSPACE/packages/test_artifact.tar.gz" \
            --title "Certbot ${TAG#v}" \
            --target "$TAG"
            --notes-file "./release_notes.md"

  ###########################
  ####       notify       ###
  ###########################
  notify_success:
    needs:
      - docker_deploy_jobs
      - snap_deploy_jobs
      - create_github_release
    uses: "./.github/workflows/notify_release.yml"
    permissions:
      actions: read
      contents: read
    with:
      success: 'True'
    secrets:
      MATTERMOST_PUBLIC_CERTBOT_CHANNEL_WEBHOOK: "${{ secrets.MATTERMOST_PUBLIC_CERTBOT_CHANNEL_WEBHOOK }}"
  notify_failure:
    needs:
      - docker_deploy_jobs
      - snap_deploy_jobs
      - create_github_release
    if: ${{ failure() }}
    uses: "./.github/workflows/notify_release.yml"
    permissions:
      actions: read
      contents: read
    with:
      success: 'False'
    secrets:
      MATTERMOST_PUBLIC_CERTBOT_CHANNEL_WEBHOOK: "${{ secrets.MATTERMOST_PUBLIC_CERTBOT_CHANNEL_WEBHOOK }}"
